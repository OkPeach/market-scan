name: update-longterm

on:
  schedule:
    # Once a day at 06:30 UTC. Analyst data changes slowly.
    - cron: "30 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-longterm
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch long-term signals
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: node scripts/fetch-longterm.mjs

      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "data: update longterm"
          file_pattern: data/longterm.json data/longterm-history.json
